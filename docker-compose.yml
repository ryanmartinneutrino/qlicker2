services:
  mongo:
    image: mongo:7
    command: ["mongod", "--port", "${MONGO_PORT:?Set MONGO_PORT in .env}", "--wiredTigerCacheSizeGB", "${MONGO_WIREDTIGER_CACHE_SIZE_GB:-0.25}"]
    ports:
      - "${MONGO_PORT:?Set MONGO_PORT in .env}:${MONGO_PORT:?Set MONGO_PORT in .env}"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--port", "${REDIS_PORT:-6379}"]
    ports:
      - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
    restart: unless-stopped

  server:
    build: ./server
    ports:
      - "${API_PORT:?Set API_PORT in .env}:${API_PORT:?Set API_PORT in .env}"
    environment:
      - PORT=${API_PORT:?Set API_PORT in .env}
      - MONGO_URI=mongodb://mongo:${MONGO_PORT:?Set MONGO_PORT in .env}/qlicker
      - MONGO_MAX_POOL_SIZE=${MONGO_MAX_POOL_SIZE:-25}
      - MONGO_MIN_POOL_SIZE=${MONGO_MIN_POOL_SIZE:-0}
      - MONGO_SERVER_SELECTION_TIMEOUT_MS=${MONGO_SERVER_SELECTION_TIMEOUT_MS:-10000}
      - MONGO_SOCKET_TIMEOUT_MS=${MONGO_SOCKET_TIMEOUT_MS:-45000}
      - MONGO_CONNECT_RETRIES=${MONGO_CONNECT_RETRIES:-6}
      - MONGO_CONNECT_RETRY_DELAY_MS=${MONGO_CONNECT_RETRY_DELAY_MS:-2000}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ROOT_URL=${ROOT_URL:-http://localhost:3000}
      - MAIL_URL=${MAIL_URL:-}
      - NODE_ENV=${NODE_ENV:-production}
      - DISABLE_RATE_LIMITS=${DISABLE_RATE_LIMITS:-false}
      - REDIS_URL=redis://redis:${REDIS_PORT:-6379}
    volumes:
      - uploads:/app/uploads
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "${APP_PORT:?Set APP_PORT in .env}:80"
    environment:
      - API_PORT=${API_PORT:?Set API_PORT in .env}
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo-data:
  uploads:
