# =============================================================================
# Qlicker — Production Docker Compose
# =============================================================================
# Usage:
#   cp .env.example .env   # then edit .env
#   docker compose up -d
#
# This file is SELF-CONTAINED. It pulls pre-built images from a registry.
# No source checkout is needed beyond this production_setup/ directory.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MongoDB
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:7.0.31
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME:?Set MONGO_INITDB_ROOT_USERNAME in .env}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:?Set MONGO_INITDB_ROOT_PASSWORD in .env}
    # Not exposed to host; only reachable within the Docker network.
    expose:
      - "27017"
    volumes:
      - mongo-data:/data/db
      - ${BACKUP_HOST_PATH:-./backups}:/backups
    # Keep the cache conservative by default so smaller deployments survive burst load.
    command: ["mongod", "--auth", "--wiredTigerCacheSizeGB", "${MONGO_WIREDTIGER_CACHE_SIZE_GB:-0.25}"]
    healthcheck:
      test: ["CMD-SHELL", "mongosh \"mongodb://$$MONGO_INITDB_ROOT_USERNAME:$$MONGO_INITDB_ROOT_PASSWORD@localhost:27017/admin?authSource=admin\" --quiet --eval \"db.runCommand({ ping: 1 }).ok\" | grep -q 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Backup manager — live mongodump scheduler with Mongo status updates
  # ---------------------------------------------------------------------------
  # Assumption: "local" backup scheduling uses the container's configured
  # timezone. Set TZ in your deployment environment if the host timezone is not
  # already reflected in the container runtime.
  backup-manager:
    image: mongo:7.0.31
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - MONGO_URI=${MONGO_URI:?Set MONGO_URI in .env}
      - BACKUP_DIR=/backups
      - BACKUP_HOST_PATH=${BACKUP_HOST_PATH:-./backups}
      - BACKUP_CHECK_INTERVAL_SECONDS=${BACKUP_CHECK_INTERVAL_SECONDS:-60}
      - TZ=${TZ:-UTC}
    volumes:
      - ${BACKUP_HOST_PATH:-./backups}:/backups
      - ./backup.sh:/scripts/backup.sh:ro
      - ./backup-manager.sh:/scripts/backup-manager.sh:ro
    command: ["/bin/sh", "/scripts/backup-manager.sh"]

  # ---------------------------------------------------------------------------
  # Redis — required for multi-instance WebSocket pub/sub
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4.8-alpine
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      - REDISCLI_AUTH=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    expose:
      - "6379"
    # Persistence: AOF + RDB for crash recovery
    command: ["sh", "-c", "exec redis-server --requirepass \"$REDIS_PASSWORD\" --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning ping | grep -q PONG"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Qlicker API server (Fastify)
  # ---------------------------------------------------------------------------
  server:
    image: ${SERVER_IMAGE:-qlicker/qlicker-server:latest}
    restart: unless-stopped
    deploy:
      replicas: ${SERVER_REPLICAS:-2}
    environment:
      - PORT=${API_PORT:-3001}
      - MONGO_URI=${MONGO_URI:?Set MONGO_URI in .env}
      - MONGO_MAX_POOL_SIZE=${MONGO_MAX_POOL_SIZE:-25}
      - MONGO_MIN_POOL_SIZE=${MONGO_MIN_POOL_SIZE:-0}
      - MONGO_SERVER_SELECTION_TIMEOUT_MS=${MONGO_SERVER_SELECTION_TIMEOUT_MS:-10000}
      - MONGO_SOCKET_TIMEOUT_MS=${MONGO_SOCKET_TIMEOUT_MS:-45000}
      - MONGO_CONNECT_RETRIES=${MONGO_CONNECT_RETRIES:-6}
      - MONGO_CONNECT_RETRY_DELAY_MS=${MONGO_CONNECT_RETRY_DELAY_MS:-2000}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set}
      - ROOT_URL=${ROOT_URL:-https://localhost}
      - MAIL_URL=${MAIL_URL:-}
      - NODE_ENV=production
      - APP_VERSION=${APP_VERSION:-v2.0.0.b1}
      - DISABLE_RATE_LIMITS=${DISABLE_RATE_LIMITS:-false}
      - REDIS_URL=${REDIS_URL:?Set REDIS_URL in .env}
    volumes:
      - uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Qlicker Client (React SPA served by internal Nginx)
  # ---------------------------------------------------------------------------
  client:
    image: ${CLIENT_IMAGE:-qlicker/qlicker-client:latest}
    restart: unless-stopped
    environment:
      - API_PORT=${API_PORT:-3001}
    depends_on:
      - server

  # ---------------------------------------------------------------------------
  # Nginx — TLS termination & reverse proxy (the only service exposed to host)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.29.7-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ${TLS_CERT_PATH:-./certs/fullchain.pem}:/etc/nginx/ssl/fullchain.pem:ro
      - ${TLS_KEY_PATH:-./certs/privkey.pem}:/etc/nginx/ssl/privkey.pem:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - server
      - client
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/healthz | grep -q '^ok$'"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Certbot — automatic Let's Encrypt certificate renewal (optional)
  # ---------------------------------------------------------------------------
  # On first run, use setup.sh --init-certs to obtain the initial certificate.
  # Renewal behavior is controlled by CERTBOT_AUTORENEW in .env.
  certbot:
    image: certbot/certbot:v5.4.0
    restart: unless-stopped
    environment:
      - CERTBOT_AUTORENEW=${CERTBOT_AUTORENEW:-false}
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    # Check every 12h; certbot renew is a no-op when not due.
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do if [ "$${CERTBOT_AUTORENEW:-false}" = "true" ]; then certbot renew --webroot -w /var/www/certbot --quiet; fi; sleep 43200 & wait $${!}; done'
    depends_on:
      - nginx

volumes:
  mongo-data:
    driver: local
  redis-data:
    driver: local
  uploads:
    driver: local
  certbot-conf:
    driver: local
  certbot-webroot:
    driver: local
